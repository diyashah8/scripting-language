 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const name = prompt("Please enter your name:");
        if (name) {
            document.write(`Hello, ${name}!`);
        } else {
            document.write("Hello, stranger!");
        }
    </script>

</body>
</html>
